spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5432/employeedb
    username: hruser
    password: hrpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.hrapp: DEBUG
    org.hibernate.SQL: DEBUG